<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Погода</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Animated Rain Background -->
        <div class="weather-background" id="weatherBackground">
            <div class="rain-container" id="rainContainer"></div>
            <div class="lightning" id="lightning"></div>
        </div>

        <!-- Sidebar -->
        <nav class="sidebar">
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9.59 4.59A2 2 0 1 1 11 8H2m10.59 11.41A2 2 0 1 0 14 16H2m15.73-8.27A2.5 2.5 0 1 1 19.5 12H2"/>
                </svg>
            </div>
            
            <div class="nav-item active">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/>
                </svg>
                <span>Погода</span>
            </div>
            
            <div class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M8 6h10M8 12h10M8 18h10M3 6h.01M3 12h.01M3 18h.01"/>
                </svg>
                <span>Города</span>
            </div>
            
            <div class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 3v18h18M9 3v18M15 3v18"/>
                </svg>
                <span>Карта</span>
            </div>
            
            <div class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                </svg>
                <span>Настройки</span>
            </div>
        </nav>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Search Bar -->
            <div class="search-bar">
                <input type="text" id="cityInput" placeholder="Поиск городов..." autocomplete="off">
            </div>

            <!-- Weather Content -->
            <div id="weatherContent" class="weather-content">
                <!-- Current Weather -->
                <div class="current-weather">
                    <div class="weather-info">
                        <h1 id="cityName" class="city-name">Мадрид</h1>
                        <p id="rainChance" class="rain-chance">Вероятность дождя: 0%</p>
                        <div class="temperature" id="temperature">31°</div>
                    </div>
                    <div class="weather-icon-large" id="weatherIcon">☀️</div>
                </div>

                <!-- Hourly Forecast -->
                <div class="hourly-forecast">
                    <h3 class="section-title">ПРОГНОЗ НА СЕГОДНЯ</h3>
                    <div id="hourlyContainer" class="hourly-container">
                        <!-- Hourly items will be inserted here -->
                    </div>
                </div>

                <!-- Air Conditions -->
                <div class="air-conditions">
                    <h3 class="section-title">УСЛОВИЯ ВОЗДУХА</h3>
                    <button class="see-more-btn">Подробнее</button>
                    <div class="conditions-grid">
                        <div class="condition-item">
                            <div class="condition-icon">🌡</div>
                            <div class="condition-info">
                                <p class="condition-label">Ощущается как</p>
                                <p id="feelsLike" class="condition-value">30°</p>
                            </div>
                        </div>
                        
                        <div class="condition-item">
                            <div class="condition-icon">💨</div>
                            <div class="condition-info">
                                <p class="condition-label">Ветер</p>
                                <p id="windSpeed" class="condition-value">0.2 км/ч</p>
                            </div>
                        </div>
                        
                        <div class="condition-item">
                            <div class="condition-icon">💧</div>
                            <div class="condition-info">
                                <p class="condition-label">Вероятность дождя</p>
                                <p id="rainPercent" class="condition-value">0%</p>
                            </div>
                        </div>
                        
                        <div class="condition-item">
                            <div class="condition-icon">☀️</div>
                            <div class="condition-info">
                                <p class="condition-label">УФ-индекс</p>
                                <p id="uvIndex" class="condition-value">3</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 7-Day Forecast Sidebar -->
            <div class="forecast-sidebar">
                <h3 class="section-title">ПРОГНОЗ НА 7 ДНЕЙ</h3>
                <div id="forecastContainer" class="forecast-list">
                    <!-- Forecast items will be inserted here -->
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
